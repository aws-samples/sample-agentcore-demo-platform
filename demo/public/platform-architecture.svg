  <text x="250" y="710" fill="#64748b" font-size="8.5">第一阶段（当前）：静态展示 + 链接跳转</text>
  <circle cx="540" cy="706" r="4" fill="#d97706"/>
  <text x="550" y="710" fill="#64748b" font-size="8.5">第二阶段（规划）：内嵌 Chat + AgentCore Runtime 按需启动</text>
