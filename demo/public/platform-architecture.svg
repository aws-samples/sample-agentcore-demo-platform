<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9900" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1976D2" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1976D2" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2E7D32" stop-opacity="0.02"/>
