    <rect x="560" y="508" width="90" height="22" rx="6" fill="#FF9900" fill-opacity="0.08" stroke="#d97706" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="605" y="523" text-anchor="middle" fill="#b45309">Observability</text>
    <rect x="660" y="508" width="58" height="22" rx="6" fill="#FF9900" fill-opacity="0.08" stroke="#d97706" stroke-opacity="0.25" stroke-width="0.8"/>
    <text x="689" y="523" text-anchor="middle" fill="#b45309">Policy</text>
    <rect x="728" y="508" width="54" height="22" rx="6" fill="#FF9900" fill-opacity="0.08" stroke="#d97706" stroke-opacity="0.25" stroke-width="0.8"/>
